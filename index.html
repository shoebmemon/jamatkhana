      }).join('')+
      '<div class="booking-card" style="margin-top:10px;">'+
        '<p class="bc-name" style="margin:0 0 4px;">Multi-floor deposit</p>'+
        '<p class="hint" style="margin:0 0 10px;">When a booking covers two floors, or all three floors together, use these lower deposit amounts instead of adding up each floor\u2019s individual deposit. Leave a box blank to keep adding the floors\u2019 deposits together as before.</p>'+
        '<div class="row2">'+
          '<div class="field" style="margin-top:0;"><label>Any 2 floors together (₹)</label><input type="number" id="set-pkg-two" value="'+attr(pkgTwo)+'" placeholder="e.g. 5000"></div>'+
          '<div class="field" style="margin-top:0;"><label>All 3 floors together (₹)</label><input type="number" id="set-pkg-three" value="'+attr(pkgThree)+'" placeholder="e.g. 5000"></div>'+
        '</div>'+
      '</div>'+
      '<div class="booking-card" style="margin-top:10px;">'+
        '<p class="bc-name" style="margin:0 0 8px;">Items on rent</p>'+
        '<p class="hint" style="margin:0 0 10px;">Add items like chairs, tables, and blankets with a rate per piece. At Final Billing you\u2019ll enter how many of each were used, and the total is added to the bill.</p>'+
        '<div id="rentalItemsList"></div>'+
        '<button type="button" class="btn ghost" id="addItemBtn" style="margin-top:10px;">+ Add item</button>'+
      '</div>'+
      '<div class="booking-card" style="margin-top:10px;">'+
        '<p class="bc-name" style="margin:0 0 8px;">Electricity</p>'+
        '<div class="field" style="margin-top:0;"><label>Rate per unit (₹)</label><input type="number" id="set-elecRate" value="'+attr(elecRate)+'" placeholder="e.g. 10"></div>'+
        '<p class="hint" style="margin:8px 0 0;">Used at Final Billing with the opening and closing meter readings to calculate the electricity charge automatically.</p>'+
      '</div>'+
      '<button class="btn primary block" id="saveSettingsBtn">Save settings</button>'+
      '<p class="hint">When time slots are on, Half day rate applies to Morning and Evening bookings, and Full day blocks the whole date. Cleaning charge is added on top of the booking charge as a separate line. When a booking covers more than one floor, each floor\u2019s rates are added together for the default total, unless overridden by the multi-floor deposit above.</p>';

    function itemRowHtml(item, idx){
      return '<div class="item-row" data-idx="'+idx+'">'+
        '<input type="text" class="item-name" placeholder="Item name (e.g. Chair)" value="'+attr(item.name)+'">'+
        '<input type="number" class="item-rate" placeholder="Rate ₹" value="'+attr(item.rate)+'">'+
        '<button type="button" class="btn danger item-remove" title="Remove item">&times;</button>'+
      '</div>';
    }

    function renderRentalItemsList(){
      var el = document.getElementById('rentalItemsList');
      el.innerHTML = workingItems.length ? workingItems.map(itemRowHtml).join('') : '<p class="hint" style="margin:0;">No items added yet.</p>';
      el.querySelectorAll('.item-row').forEach(function(row){
        var idx = parseInt(row.getAttribute('data-idx'),10);
        row.querySelector('.item-name').addEventListener('input', function(){ workingItems[idx].name = this.value; });
        row.querySelector('.item-rate').addEventListener('input', function(){ workingItems[idx].rate = this.value; });
        row.querySelector('.item-remove').onclick = function(){ workingItems.splice(idx,1); renderRentalItemsList(); };
      });
    }
    renderRentalItemsList();

    document.getElementById('addItemBtn').onclick = function(){
      workingItems.push({ name:'', rate:'' });
      renderRentalItemsList();
    };

    document.getElementById('setSlotsEnabled').onchange = function(){
      var checked = this.checked;
      FLOORS.forEach(function(f){
        document.getElementById('halfDayWrap-'+f.id).style.display = checked ? '' : 'none';
        document.getElementById('lbl-fullDay-'+f.id).textContent = checked ? 'Full day (₹)' : 'Booking charge (₹)';
      });
    };

    document.getElementById('saveSettingsBtn').onclick = async function(){
      var newSettings = { slotsEnabled: document.getElementById('setSlotsEnabled').checked };
      FLOORS.forEach(function(f){
        newSettings[f.id] = {
          fullDay: document.getElementById('set-'+f.id+'-fullDay').value.trim(),
          halfDay: document.getElementById('set-'+f.id+'-halfDay').value.trim(),
          cleaning: document.getElementById('set-'+f.id+'-cleaning').value.trim(),
          deposit: document.getElementById('set-'+f.id+'-deposit').value.trim()
        };
      });
      newSettings.packageTwoFloorsDeposit = document.getElementById('set-pkg-two').value.trim();
      newSettings.packageThreeFloorsDeposit = document.getElementById('set-pkg-three').value.trim();
      newSettings.inventoryItems = workingItems
        .filter(function(it){ return (it.name||'').trim()!==''; })
        .map(function(it){ return { name: (it.name||'').trim(), rate: (it.rate!=null?String(it.rate).trim():'') }; });
      newSettings.elecRate = document.getElementById('set-elecRate').value.trim();

      var btn = document.getElementById('saveSettingsBtn');
      btn.textContent = 'Saving…';
      var ok = await saveSettings(newSettings);
      btn.textContent = ok ? 'Saved ✓' : 'Save settings';
      if(ok){
        renderCalendar();
        setTimeout(function(){ btn.textContent = 'Save settings'; }, 1500);
      }
    };
  }

  function renderExportPanel(panel){
    panel.innerHTML =
      '<p class="hint" style="margin-top:0;">Download the full booking register as a spreadsheet (CSV) — all floors, all dates.</p>'+
      '<button class="btn primary block" id="exportBtn">Download CSV</button>';
    document.getElementById('exportBtn').onclick = downloadCsv;
  }

  function downloadCsv(){
    var rows = [[
      'Floor','Date','Slot','Event','Name','Mobile','Address','Floor Charges','Cleaning Charge','Security Deposit',
      'Items Used','Items Total','Electricity Opening','Electricity Closing','Electricity Charge',
      'Total Configuration','Amount Paid','Balance Due','Advance/Excess Held','Payment Details',
      'Billing Complete','Billing Processed On','Billing Notes'
    ]];
    uniqueBookingsFlat().sort(function(a,b){ return a.iso.localeCompare(b.iso); }).forEach(function(item){
      var b = item.b;
      var eventLabel = b.eventType==='Other' ? (b.eventTypeOther||'Other') : (b.eventType||'');
      var total = payableTotal(b);
      var balance = balanceDueOf(b);
      var advance = advancePaidOf(b);
      var itemsDesc = (b.inventoryQuantities && Object.keys(b.inventoryQuantities).length)
        ? Object.keys(b.inventoryQuantities).map(function(name){ return name+' x'+b.inventoryQuantities[name]; }).join(', ')
        : '';
      rows.push([
        item.floorLabel, item.iso, slotLabelOf(b)||'', eventLabel, b.name, b.mobile, b.address||'',
        num(b.totalAmount), num(b.cleaningCharge), num(b.sdAmount),
        itemsDesc, num(b.inventoryCharges), num(b.elecOpen), num(b.elecClose), num(b.elecCharges),
        total, num(b.amountPaid), balance, advance, b.paymentDetails||'',
        b.sdReleased?'Yes':'No', b.sdReleaseDate||'', b.sdReleaseNotes||''
      ]);
    });
    var csv = rows.map(function(r){
      return r.map(function(cell){
        var s = String(cell==null?'':cell);
        if(/[",\n]/.test(s)) s = '"'+s.replace(/"/g,'""')+'"';
        return s;
      }).join(',');
    }).join('\n');
    var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'jamatkhana-bookings.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ---------- Nav ----------
  document.getElementById('prevBtn').onclick = function(){
    state.viewMonth--; if(state.viewMonth<0){ state.viewMonth=11; state.viewYear--; } renderCalendar();
  };
  document.getElementById('nextBtn').onclick = function(){
    state.viewMonth++; if(state.viewMonth>11){ state.viewMonth=0; state.viewYear++; } renderCalendar();
  };
  document.getElementById('todayBtn').onclick = function(){
    var t = new Date(); state.viewYear = t.getFullYear(); state.viewMonth = t.getMonth(); renderCalendar();
  };

  // --- NEW: Swipe to change floors ---
  var touchStartX = 0;
  var touchEndX = 0;
  var swipeCard = document.querySelector('.card');

  if (swipeCard) {
    swipeCard.addEventListener('touchstart', function(e) {
      touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});

    swipeCard.addEventListener('touchend', function(e) {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, {passive: true});
  }

  function handleSwipe() {
    var swipeThreshold = 50; 
    var diff = touchEndX - touchStartX;
    
    if (Math.abs(diff) < swipeThreshold) return; 

    var tabOrder = ['ground', 'first', 'second', 'all'];
    var currentIndex = tabOrder.indexOf(state.currentFloor);
    if (currentIndex === -1) currentIndex = 0;

    if (diff < 0) {
      if (currentIndex < tabOrder.length - 1) {
        state.currentFloor = tabOrder[currentIndex + 1];
        renderFloorTabs();
        renderCalendar();
      }
    } else {
      if (currentIndex > 0) {
        state.currentFloor = tabOrder[currentIndex - 1];
        renderFloorTabs();
        renderCalendar();
      }
    }
  }

  // ---------- Auth gate ----------
  var loginScreen = document.getElementById('loginScreen');
  var appRoot = document.getElementById('appRoot');
  var loginErr = document.getElementById('loginErr');
  var appStarted = false;

  function showLogin(message){
    appRoot.style.display = 'none';
    loginScreen.style.display = 'flex';
    if(message){ loginErr.textContent = message; loginErr.style.display = 'block'; }
    else { loginErr.style.display = 'none'; }
  }

  function startApp(){
    loginScreen.style.display = 'none';
    appRoot.style.display = 'block';
    if(appStarted) return;
    appStarted = true;
    renderFloorTabs();
    renderWeekdays();
    renderCalendar();
    Promise.all([loadAll(), loadSettings()]).then(renderCalendar);
  }

  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    var email = document.getElementById('loginEmail').value.trim();
    var password = document.getElementById('loginPassword').value;
    var remember = document.getElementById('rememberMe').checked;
    if(!email || !password){
      loginErr.textContent = 'Please enter your email and password.';
      loginErr.style.display = 'block';
      return;
    }
    loginErr.style.display = 'none';
    var persistence = remember ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION;
    auth.setPersistence(persistence).then(function(){
      return auth.signInWithEmailAndPassword(email, password);
    }).catch(function(err){
      loginErr.textContent = 'Sign in failed: ' + (err && err.message ? err.message : 'please check your email and password.');
      loginErr.style.display = 'block';
    });
  });

  document.getElementById('logoutBtn').onclick = function(){
    auth.signOut();
  };

  auth.onAuthStateChanged(function(user){
    if(user){ startApp(); }
    else { showLogin(); }
  });

})();
</script>
</body>
</html>
