<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Jamat Khana Booking</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Marcellus&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#F7F3E8;
  --surface:#FFFFFF;
  --ink:#1B2E2C;
  --ink-soft:#5B6C67;
  --teal:#0F4C4C;
  --teal-dark:#0A3535;
  --gold:#C89B3C;
  --gold-soft:#F1E3B9;
  --gold-mid:#E8CE8C;
  --gold-line:#E1C783;
  --rose:#A3453A;
  --rose-soft:#F1D9D3;
  --green:#3F6B4C;
  --green-soft:#DCE7DC;
  --line:#E6DEC7;
  --shadow: 0 10px 30px rgba(15,40,40,0.10);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0; overflow-x:hidden; -webkit-text-size-adjust:100%;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Work Sans', sans-serif;
  -webkit-font-smoothing:antialiased;
}

.app{ max-width:960px; margin:0 auto; padding:clamp(14px,4vw,36px); width:100%; }

/* ---------- Header ---------- */
.header{
  position:relative;
  background:linear-gradient(160deg,var(--teal) 0%, var(--teal-dark) 100%);
  border-radius:18px;
  padding:clamp(20px,4vw,32px) clamp(20px,5vw,36px);
  color:#F7F3E8; overflow:hidden; box-shadow:var(--shadow);
}
.header::before{
  content:""; position:absolute; inset:0;
  background-image: var(--star-pattern);
  background-size: 84px 84px; opacity:0.14; pointer-events:none;
}
.header-inner{position:relative; display:flex; align-items:center; gap:16px; flex-wrap:wrap;}
.mark{ width:42px; height:42px; flex:none; color:var(--gold); }
.titles{flex:1; min-width:180px;}
.eyebrow{
  font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--gold); opacity:0.9; margin:0 0 4px;
}
h1{ font-family:'Marcellus', serif; font-size:clamp(22px,4vw,30px); margin:0; font-weight:400; letter-spacing:0.01em; }
.subtitle{margin:6px 0 0; font-size:13.5px; color:#D9E3DE; opacity:0.85;}

.header-actions{position:relative; display:flex; gap:8px; flex-wrap:wrap;}
.icon-btn{
  display:flex; align-items:center; gap:7px;
  font-family:'Work Sans', sans-serif; font-weight:600; font-size:13px;
  padding:9px 14px; border-radius:10px; border:1px solid rgba(247,243,232,0.28);
  background:rgba(247,243,232,0.1); color:#F1EDE0; cursor:pointer;
}
.icon-btn:hover{background:rgba(247,243,232,0.2);}

.floor-row{ display:flex; gap:8px; margin-top:22px; flex-wrap:wrap; position:relative; }
.floor-tab{
  font-family:'Work Sans', sans-serif; font-weight:600; font-size:13.5px;
  padding:9px 16px; border-radius:999px; border:1px solid rgba(247,243,232,0.25);
  background:rgba(247,243,232,0.08); color:#EDE7D4; cursor:pointer;
  display:flex; align-items:center; gap:7px;
  transition:background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
}
.floor-tab .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:0.6;}
.floor-tab:hover{background:rgba(247,243,232,0.16);}
.floor-tab.active{ background:var(--gold); color:var(--teal-dark); border-color:var(--gold); }

/* ---------- Card / Calendar ---------- */
.card{
  background:var(--surface); border-radius:18px; margin-top:18px;
  padding:clamp(16px,3vw,28px); box-shadow:var(--shadow); border:1px solid var(--line);
}
.cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:10px; flex-wrap:wrap; }
.month-label{ font-family:'Marcellus', serif; font-size:20px; color:var(--teal-dark); }
.nav-group{display:flex; align-items:center; gap:6px;}
.nav-btn{
  width:34px; height:34px; border-radius:10px; border:1px solid var(--line); background:var(--bg);
  color:var(--teal-dark); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background 0.15s ease;
}
.nav-btn:hover{background:var(--gold-soft);}
.today-btn{
  font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.05em; text-transform:uppercase;
  border:1px solid var(--line); background:var(--bg); color:var(--ink-soft); border-radius:10px; padding:0 12px;
  height:34px; cursor:pointer;
}
.today-btn:hover{color:var(--teal-dark); border-color:var(--gold);}

/* Month summary strip */
.summary-strip{
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px;
}
.summary-cell{
  background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:10px 12px;
}
.summary-cell .num{ font-family:'IBM Plex Mono', monospace; font-size:16px; font-weight:600; color:var(--teal-dark); }
.summary-cell .lbl{ font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.04em; margin-top:2px; }

.weekdays{
  display:grid; grid-template-columns:repeat(7,1fr); font-family:'IBM Plex Mono', monospace;
  font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:6px;
}
.weekdays > div{text-align:center; padding:4px 0;}

.grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.day{
  position:relative; aspect-ratio:1/1; border-radius:12px; border:1px solid var(--line); background:var(--bg);
  display:flex; flex-direction:column; align-items:flex-start; justify-content:flex-start;
  padding:6px 6px 4px; cursor:pointer; transition:transform 0.1s ease, box-shadow 0.15s ease; overflow:hidden;
}
.day:hover{transform:translateY(-1px); box-shadow:0 4px 10px rgba(15,40,40,0.10);}
.day.muted{opacity:0.35; cursor:default;}
.day.muted:hover{transform:none; box-shadow:none;}
.day .num{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink-soft); }
.day.is-today .num{ color:var(--teal-dark); font-weight:600; background:var(--gold-soft); border-radius:6px; padding:0 5px; }
.day.partial{ background:var(--gold-soft); border-color:var(--gold-line); }
.day.full-booked{ background:var(--gold-mid); border-color:var(--gold); }
.day.is-booked .num{color:var(--teal-dark); font-weight:600;}
.day.released{ background:var(--green-soft); border-color:#BFD2C0; }
.day .name{
  margin-top:auto; font-size:10px; font-weight:600; color:var(--teal-dark);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;
}
.day .status-dot{ position:absolute; top:6px; right:6px; width:7px; height:7px; border-radius:50%; background:var(--rose); }
.day.released .status-dot{background:var(--green);}
.day .count-badge{
  position:absolute; top:5px; left:6px; font-family:'IBM Plex Mono', monospace;
  font-size:9px; color:var(--teal-dark); opacity:0.7;
}

.legend{ display:flex; gap:16px; flex-wrap:wrap; margin-top:16px; font-size:12px; color:var(--ink-soft); }
.legend-item{display:flex; align-items:center; gap:6px;}
.swatch{width:12px; height:12px; border-radius:4px; border:1px solid var(--line);}
.swatch.available{background:var(--bg);}
.swatch.partial{background:var(--gold-soft); border-color:var(--gold-line);}
.swatch.full{background:var(--gold-mid); border-color:var(--gold);}
.swatch.released{background:var(--green-soft); border-color:#BFD2C0;}

/* ---------- Overlay / Modal (shared) ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(10,25,25,0.45); display:none;
  align-items:center; justify-content:center; padding:18px; z-index:50;
}
.overlay.show{display:flex;}
.modal{
  background:var(--surface); border-radius:16px; max-width:480px; width:100%;
  max-height:88vh; overflow-y:auto; padding:24px 24px 20px; box-shadow:0 24px 60px rgba(10,25,25,0.35);
}
.modal.wide{max-width:600px;}
.modal-head{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:4px;}
.modal-date{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-soft); margin:0 0 2px; }
.modal-title{font-family:'Marcellus', serif; font-size:19px; color:var(--teal-dark); margin:0;}
.close-btn{ background:none; border:none; font-size:20px; color:var(--ink-soft); cursor:pointer; line-height:1; padding:2px 4px; }
.close-btn:hover{color:var(--ink);}

.field{margin-top:14px;}
.field label{ display:block; font-size:11.5px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:5px; }
.field input, .field textarea, .field select{
  width:100%; font-family:'Work Sans', sans-serif; font-size:16px; border:1px solid var(--line);
  border-radius:9px; padding:9px 11px; background:var(--bg); color:var(--ink); resize:vertical;
}
.field input:focus, .field textarea:focus, .field select:focus{ outline:none; border-color:var(--gold); background:#fff; }
.row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.row3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}

.slot-choice{display:flex; gap:8px; margin-top:6px; flex-wrap:wrap;}
.slot-opt{
  flex:1; min-width:100px; text-align:center; padding:10px 8px; border-radius:10px; border:1px solid var(--line);
  background:var(--bg); font-size:12.5px; font-weight:600; cursor:pointer; color:var(--ink-soft);
}
.slot-opt.selected{ border-color:var(--gold); background:var(--gold-soft); color:var(--teal-dark); }
.slot-opt.disabled{ opacity:0.4; cursor:not-allowed; text-decoration:line-through; }

.booking-card{
  border:1px solid var(--line); border-radius:12px; padding:12px 13px; margin-top:12px; background:var(--bg);
}
.bc-head{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
.bc-slot{
  font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:0.05em; text-transform:uppercase;
  background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:2px 9px; color:var(--teal-dark);
}
.bc-name{font-family:'Marcellus', serif; font-size:16px; color:var(--teal-dark); margin:6px 0 2px;}
.bc-event{font-size:12.5px; color:var(--ink-soft);}
.bc-pill{
  font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:0.05em; text-transform:uppercase;
  padding:3px 9px; border-radius:999px; white-space:nowrap;
}
.bc-pill.pending{background:var(--gold-soft); color:#7A5B14; border:1px solid var(--gold-line);}
.bc-pill.released{background:var(--green-soft); color:var(--green); border:1px solid #BFD2C0;}
.bc-rows{margin-top:8px;}
.bc-row{display:flex; justify-content:space-between; font-size:12.5px; padding:4px 0; border-bottom:1px solid var(--line);}
.bc-row:last-child{border-bottom:none;}
.bc-row .k{color:var(--ink-soft);}
.bc-row .v{font-weight:600; text-align:right;}
.bc-row .v.mono{font-family:'IBM Plex Mono', monospace; font-weight:500;}
.bc-row a{color:var(--teal); text-decoration:none;}
.bc-row a:hover{text-decoration:underline;}
.bc-actions{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}

.btn{
  font-family:'Work Sans', sans-serif; font-weight:600; font-size:13px;
  padding:8px 13px; border-radius:9px; border:1px solid transparent; cursor:pointer; text-align:center;
}
.btn.block{display:block; width:100%; margin-top:14px; padding:11px 14px; font-size:13.5px;}
.btn.primary{background:var(--teal); color:#fff;}
.btn.primary:hover{background:var(--teal-dark);}
.btn.ghost{background:var(--surface); color:var(--ink); border-color:var(--line);}
.btn.ghost:hover{border-color:var(--gold);}
.btn.danger{background:var(--rose-soft); color:var(--rose);}
.btn.danger:hover{background:#E9C4BC;}
.btn.release{background:var(--green-soft); color:var(--green);}
.btn.release:hover{background:#CBDECB;}
.btn.add{background:var(--gold-soft); color:#7A5B14; border-color:var(--gold-line);}
.btn.add:hover{background:var(--gold-mid);}

.hint{font-size:12px; color:var(--ink-soft); margin-top:8px;}
.err{color:var(--rose); font-size:12px; margin-top:8px; display:none;}
.balance-note{font-size:12.5px; margin-top:6px; color:var(--ink-soft);}
.balance-note b{color:var(--teal-dark);}

/* Overview modal specifics */
.tab-row{display:flex; gap:6px; margin-top:14px; border-bottom:1px solid var(--line);}
.ov-tab{
  font-size:12.5px; font-weight:600; color:var(--ink-soft); padding:8px 4px; cursor:pointer;
  border-bottom:2px solid transparent; margin-bottom:-1px;
}
.ov-tab.active{color:var(--teal-dark); border-bottom-color:var(--gold);}
.ov-panel{margin-top:14px;}
.search-result{
  display:flex; justify-content:space-between; align-items:center; gap:10px;
  padding:10px 0; border-bottom:1px solid var(--line); cursor:pointer;
}
.search-result:hover{background:var(--bg);}
.search-result .sr-left{font-size:13px;}
.search-result .sr-left .n{font-weight:600; color:var(--teal-dark);}
.search-result .sr-left .m{font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:var(--ink-soft);}
.search-result .sr-right{font-size:11px; text-align:right; color:var(--ink-soft);}
.empty-note{font-size:13px; color:var(--ink-soft); padding:12px 0;}

.footer-note{ text-align:center; font-size:11.5px; color:var(--ink-soft); margin-top:16px; opacity:0.8; }

.btn.whatsapp{ background:#25D366; color:#fff; }
.btn.whatsapp:hover{ background:#1DA851; }

/* ---------- Receipt paper ---------- */
.receipt-paper{
  border:1.5px solid var(--teal-dark); border-radius:4px; padding:20px 22px; margin-top:14px;
  background:#FEFCF6; position:relative;
}
.receipt-paper::before{
  content:""; position:absolute; inset:6px; border:1px dashed var(--gold-line); border-radius:2px; pointer-events:none;
}
.rp-head{ text-align:center; padding-bottom:12px; margin-bottom:12px; border-bottom:2px solid var(--teal-dark); }
.rp-head .rp-title{ font-family:'Marcellus', serif; font-size:19px; color:var(--teal-dark); margin:0; }
.rp-head .rp-sub{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft); margin:4px 0 0; }
.rp-ref{ text-align:center; font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--gold); letter-spacing:0.06em; margin-bottom:14px; }
.rp-row{ display:flex; justify-content:space-between; gap:10px; padding:6px 0; border-bottom:1px dotted var(--line); font-size:13px; }
.rp-row:last-child{border-bottom:none;}
.rp-row .k{color:var(--ink-soft);}
.rp-row .v{font-weight:600; text-align:right;}
.rp-row .v.mono{font-family:'IBM Plex Mono', monospace; font-weight:500;}
.rp-divider{ border-top:1px dashed var(--gold-line); margin:10px 0; }
.rp-footer{ text-align:center; margin-top:14px; font-size:11.5px; color:var(--ink-soft); font-style:italic; }

/* ---------- Accounts summary ---------- */
.acct-hero{
  background:linear-gradient(160deg,var(--teal) 0%, var(--teal-dark) 100%);
  color:#F7F3E8; border-radius:14px; padding:18px 20px; margin-top:4px;
}
.acct-hero .lbl{ font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--gold); opacity:0.9; }
.acct-hero .num{ font-family:'Marcellus', serif; font-size:32px; margin:4px 0 0; }
.acct-hero .sub{ font-size:12px; color:#D9E3DE; opacity:0.85; margin-top:6px; }

.acct-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:14px; }
.acct-card{ background:var(--bg); border:1px solid var(--line); border-left:4px solid var(--line); border-radius:12px; padding:12px 14px; }
.acct-card.received{border-left-color:var(--green);}
.acct-card.sd-collected{border-left-color:var(--gold);}
.acct-card.sd-released{border-left-color:var(--teal);}
.acct-card.balance-due{border-left-color:var(--rose);}
.acct-card .num{ font-family:'IBM Plex Mono', monospace; font-size:16.5px; font-weight:600; color:var(--teal-dark); }
.acct-card .lbl{ font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.03em; margin-top:4px; }

#printArea{display:none;}

@media print{
  body.printing > .app{display:none !important;}
  body.printing > .overlay{ position:static !important; background:none !important; padding:0 !important; }
  body.printing #printArea{ display:block; }
  body.printing .receipt-paper{ margin-top:0; }
}

@media (max-width:520px){
  .row2, .row3{grid-template-columns:1fr;}
  .summary-strip{grid-template-columns:repeat(2,1fr);}
  .day .name{display:none;}
  .acct-grid{grid-template-columns:1fr;}
  .modal{padding:20px 16px 16px;}
  .header-inner{gap:12px;}
  .header-actions{width:100%;}
  .header-actions .icon-btn{width:100%; justify-content:center;}
}

@media (max-width:380px){
  .grid{gap:4px;}
  .day{border-radius:9px; padding:4px 4px 3px;}
  .day .num{font-size:11px;}
  .floor-tab{font-size:12.5px; padding:8px 12px;}
  .month-label{font-size:17px;}
}
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="header-inner">
      <svg class="mark" viewBox="0 0 100 100" fill="none">
        <g stroke="currentColor" stroke-width="3" stroke-linejoin="round">
          <path d="M50 5 L61 39 L95 39 L67 60 L78 94 L50 73 L22 94 L33 60 L5 39 L39 39 Z"/>
        </g>
      </svg>
      <div class="titles">
        <p class="eyebrow">Booking Register</p>
        <h1>Jamat Khana Booking</h1>
        <p class="subtitle">Ground · First · Second Floor — availability, events &amp; deposit tracking</p>

      <div class="header-actions">
        <button class="icon-btn" id="overviewBtn">Overview &amp; Search</button>

    </div>

    <div class="summary-strip" id="summaryStrip"></div>

    <div class="weekdays" id="weekdays"></div>
    <div class="grid" id="grid"></div>

    <div class="legend">
      <div class="legend-item"><span class="swatch available"></span>Available</div>
      <div class="legend-item"><span class="swatch partial"></span>One slot booked</div>
      <div class="legend-item"><span class="swatch full"></span>Fully booked</div>
      <div class="legend-item"><span class="swatch released"></span>Deposit released</div>
    </div>
  </div>

  <p class="footer-note" id="footerNote">Loading bookings…</p>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modalBox"></div></div>
<div class="overlay" id="overlayOv"><div class="modal wide" id="modalOv"></div></div>
<div id="printArea"></div>

  function num(v){ var n = parseFloat(v); return isNaN(n) ? 0 : n; }
